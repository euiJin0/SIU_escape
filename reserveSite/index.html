<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>방탈출 예약 시스템</title>
    <style>
        /* 디자인 부분 */
        body { font-family: sans-serif; background: #2c2c3e; color: white; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #3b3b4f; padding: 30px; border-radius: 15px; }
        .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        button { padding: 10px; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; }
        .available { background: #4a4a6a; color: #fff; }
        .available:hover { background: #6a6a8a; }
        .booked { background: #222; color: #666; cursor: not-allowed; opacity: 0.6; }
        .selected { background: #e91e63 !important; color: white; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        label { display: block; text-align: left; margin-top: 10px; font-size: 0.9em; color: #ccc; }
    </style>
</head>
<body>

<div class="container">
    <h2>📅 날짜 선택</h2>
    <input type="date" id="res-date" min="2026-04-27" max="2026-04-30">

    <div id="time-section" style="display:none;">
        <h3>⏰ 시간 선택</h3>
        <div id="time-grid" class="time-grid"></div>
    </div>

    <div id="info-section" style="display:none; margin-top:30px; border-top: 1px solid #555; padding-top: 20px;">
        <label>대표자 성함</label>
        <input type="text" id="user-name" placeholder="이름을 입력하세요">
        
        <label>인원 선택</label>
        <select id="user-count">
            <option value="2">2명</option>
            <option value="3">3명</option>
            <option value="4">4명</option>
        </select>
        
        <label>연락처</label>
        <input type="tel" id="user-phone" placeholder="010-0000-0000">
        
        <button id="submit-btn" onclick="submitBooking()" style="background:#e91e63; width:100%; color:white; font-weight:bold; height: 50px; margin-top: 20px; font-size: 1.1em;">예약 확정하기</button>
    </div>
</div>

<script>
    // ⚠️ 주의: 구글 앱 스크립트 배포 후 받은 URL을 반드시 여기에 붙여넣으세요!
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwNSqQ-ecrUM5FqhBBeCPB-Vb6jIuqQ-AZKJe4qha01arteWricUMNibiDxULs7Pg_Q/exec";
    
    let selectedTime = "";
    const times = [];
    
    // 10:00부터 17:30까지 30분 간격 생성
    for(let h=10; h<=17; h++) {
        times.push(`${h}:00`);
        times.push(`${h}:30`);
    }

    // 날짜 선택 시 이벤트
    document.getElementById('res-date').addEventListener('change', function() {
        document.getElementById('time-section').style.display = 'block';
        document.getElementById('info-section').style.display = 'none'; // 날짜 바뀌면 정보입력창 숨김
        selectedTime = ""; 
        renderTimes(this.value);
    });

    // 시간 버튼 생성 및 예약 막기 로직
    async function renderTimes(date) {
        const grid = document.getElementById('time-grid');
        grid.innerHTML = "<p style='grid-column: span 3;'>예약 현황 확인 중...</p>";
        
        try {
            const response = await fetch(SCRIPT_URL);
            const bookedData = await response.json();
            
            grid.innerHTML = "";
            times.forEach(t => {
                // 시트 데이터와 비교 (날짜 형식을 yyyy-mm-dd로 맞춰서 비교)
                const isBooked = bookedData.some(row => {
                    if(!row[0] || row[0] === "date") return false;
                    const formattedRowDate = new Date(row[0]).toISOString().split('T')[0];
                    return formattedRowDate === date && row[1].toString() === t.toString();
                });

                const btn = document.createElement('button');
                btn.innerHTML = `<strong>${t}</strong><br>${isBooked ? "예약불가" : "예약가능"}`;
                btn.className = isBooked ? "booked" : "available";
                
                if(!isBooked) {
                    btn.onclick = () => {
                        selectedTime = t;
                        document.querySelectorAll('.available').forEach(b => b.classList.remove('selected'));
                        btn.classList.add('selected');
                        document.getElementById('info-section').style.display = 'block';
                    };
                } else {
                    btn.disabled = true;
                }
                grid.appendChild(btn);
            });
        } catch (e) {
            grid.innerHTML = "<p style='color:red;'>데이터를 불러오지 못했습니다.</p>";
        }
    }

    // 예약 제출 함수
    async function submitBooking() {
        const submitBtn = document.getElementById('submit-btn');
        const data = {
            date: document.getElementById('res-date').value,
            time: selectedTime,
            name: document.getElementById('user-name').value,
            count: document.getElementById('user-count').value,
            phone: document.getElementById('user-phone').value
        };

        if(!data.name || !data.phone || !selectedTime) {
            return alert("모든 정보를 입력하고 시간 버튼을 클릭해주세요.");
        }

        // 중복 클릭 방지 (속도 개선을 위해 즉시 반응)
        submitBtn.disabled = true;
        submitBtn.innerText = "⏳ 예약 처리 중...";

        try {
            const res = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(data)
            });

            const result = await res.text();
            
            if(result === "SUCCESS") {
                alert("✅ 예약이 완료되었습니다!");
                location.reload(); 
            } else if(result === "ALREADY_BOOKED") {
                alert("❌ 그새 다른 분이 예약하셨네요! 다른 시간을 선택해주세요.");
                renderTimes(data.date);
            }
        } catch (e) {
            alert("연결 오류가 발생했습니다. 잠시 후 다시 시도해주세요.");
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "예약 확정하기";
        }
    }
</script>

</body>
</html>
