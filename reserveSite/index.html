<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>방탈출 예약 시스템</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 500px; margin: auto; border: 1px solid #ccc; padding: 20px; border-radius: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        
        /* 시간 선택 버튼 스타일 */
        .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .time-btn { padding: 10px; border: 1px solid #ddd; background: #f9f9f9; cursor: pointer; text-align: center; }
        .time-btn.selected { background: #007bff; color: white; border-color: #007bff; }
        .time-btn:disabled { background: #eee; color: #aaa; cursor: not-allowed; }

        .submit-btn { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .submit-btn:disabled { background: #94d3a2; }

        #staff-section { margin-top: 30px; border-top: 2px solid #333; padding-top: 20px; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔒 방탈출 예약하기</h2>
    
    <div class="form-group">
        <label>날짜 선택 (4/27 ~ 4/30 한정)</label>
        <input type="date" id="res-date" min="2026-04-27" max="2026-04-30">
    </div>

    <div class="form-group">
        <label>시간 선택 (10:00 ~ 17:30)</label>
        <div id="time-slots" class="time-grid">
            </div>
    </div>

    <div class="form-group">
        <label>대표자 이름</label>
        <input type="text" id="res-name" placeholder="성함을 입력하세요">
    </div>

    <div class="form-group">
        <label>인원 수</label>
        <select id="res-count">
            <option value="2">2명</option>
            <option value="3">3명</option>
            <option value="4">4명</option>
        </select>
    </div>

    <div class="form-group">
        <label>전화번호</label>
        <input type="tel" id="res-phone" placeholder="010-0000-0000">
    </div>

    <button class="submit-btn" id="confirm-btn" onclick="makeReservation()">예약 확정</button>

    <div id="staff-section">
        <button onclick="showStaffLogin()">스태프 관리 페이지</button>
        <div id="staff-content" class="hidden">
            <h3>📋 예약 내역 확인</h3>
            <table id="res-table">
                <thead>
                    <tr>
                        <th>날짜</th>
                        <th>시간</th>
                        <th>이름</th>
                        <th>인원</th>
                    </tr>
                </thead>
                <tbody id="res-list"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 1. 초기 설정 및 시간 데이터 생성 (10:00 ~ 17:30, 30분 간격)
    const timeSlotsContainer = document.getElementById('time-slots');
    let selectedTime = null;
    let reservations = []; // 실제 개발 시에는 DB나 로컬스토리지를 사용합니다.

    function generateTimeSlots() {
        timeSlotsContainer.innerHTML = '';
        let start = 10 * 60; // 10:00 (분을 단위로 계산)
        let end = 17 * 60 + 30; // 17:30

        for (let time = start; time <= end; time += 30) {
            let h = Math.floor(time / 60);
            let m = time % 60;
            let timeStr = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
            
            const btn = document.createElement('button');
            btn.className = 'time-btn';
            btn.innerText = timeStr;
            btn.onclick = () => selectTime(timeStr, btn);
            
            // 이미 예약된 시간인지 확인
            const date = document.getElementById('res-date').value;
            if (reservations.some(r => r.date === date && r.time === timeStr)) {
                btn.disabled = true;
            }

            timeSlotsContainer.appendChild(btn);
        }
    }

    // 시간 선택 함수
    function selectTime(time, btn) {
        document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedTime = time;
    }

    // 2. 예약 실행 함수
    function makeReservation() {
        const date = document.getElementById('res-date').value;
        const name = document.getElementById('res-name').value;
        const phone = document.getElementById('res-phone').value;
        const count = document.getElementById('res-count').value;
        const btn = document.getElementById('confirm-btn');

        if (!date || !selectedTime || !name || !phone) {
            alert("모든 정보를 입력하고 시간을 선택해 주세요.");
            return;
        }

        // 중복 클릭 방지를 위해 버튼 잠시 비활성화
        btn.disabled = true;
        btn.innerText = "처리 중...";

        setTimeout(() => {
            // 데이터 저장
            const newRes = { date, time: selectedTime, name, count, phone };
            reservations.push(newRes);

            alert(`${name}님, ${selectedTime} 예약이 확정되었습니다!`);
            
            // 초기화
            document.getElementById('res-name').value = '';
            document.getElementById('res-phone').value = '';
            selectedTime = null;
            btn.disabled = false;
            btn.innerText = "예약 확정";
            generateTimeSlots(); // 예약 완료 후 시간표 새로고침 (해당 시간 비활성화)
        }, 500); // 0.5초 후 완료 처리 (응답 속도 체감 개선)
    }

    // 3. 스태프 관리 로직
    function showStaffLogin() {
        const password = prompt("스태프 비밀번호를 입력하세요:");
        if (password === "1234") { // 비밀번호 예시
            document.getElementById('staff-content').classList.remove('hidden');
            renderStaffTable();
        } else {
            alert("비밀번호가 틀렸습니다.");
        }
    }

    function renderStaffTable() {
        const list = document.getElementById('res-list');
        list.innerHTML = '';
        reservations.forEach(r => {
            const row = `<tr><td>${r.date}</td><td>${r.time}</td><td>${r.name}</td><td>${r.count}명</td></tr>`;
            list.innerHTML += row;
        });
    }

    // 날짜 변경 시 시간표 새로고침
    document.getElementById('res-date').addEventListener('change', generateTimeSlots);
    
    // [수정] 페이지 로드 시 초기 설정 (4월 27일 고정)
    window.onload = () => {
        const dateInput = document.getElementById('res-date');
        dateInput.value = "2026-04-27"; // 기본값 설정
        generateTimeSlots();
    };
</script>

</body>
</html>
