<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>잠금 화면</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
  }

  body {
    height: 100vh;
    background: url("window.jpg") no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
  }

  .overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
  }

  .login-box {
    position: relative;
    text-align: center;
    z-index: 1;
  }

  .avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    overflow: hidden;
    margin: 0 auto 20px;
  }

  .avatar img {
    width: 100%;
    height: 100%;
  }

  .username {
    font-size: 28px;
    margin-bottom: 20px;
  }

  .input-box {
    display: flex;
    justify-content: center;
    align-items: center;
  }

  input {
    padding: 10px;
    font-size: 18px;
    border: none;
    outline: none;
    width: 220px;
  }

  button {
    padding: 10px 15px;
    font-size: 18px;
    border: none;
    cursor: pointer;
    background: rgba(255,255,255,0.3);
    color: white;
  }
</style>

</head>
<body>

<div class="overlay"></div>

<div class="login-box">
  <div class="avatar">
    <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
  </div>

  <div class="username">User</div>

<div class="input-box">
  <form autocomplete="off" onsubmit="return false;">
    <input 
      type="password" 
      id="password" 
      name="fake-password"
      placeholder="비밀번호 입력"
      autocomplete="new-password">
    <button onclick="go()">→</button>
  </form>
</div>

<div id="error" style="color:#ff8080; margin-top:10px;"></div>

<script>
  const TARGET_URL = "https://euijin0.github.io/SIU_escape/contestSite/"; // 👉 원하는 사이트로 변경

  const PASSWORD = "2006"; // 🔥 여기 비밀번호 설정

function go() {
  const input = document.getElementById("password").value;
  const error = document.getElementById("error");

  if (input === PASSWORD) {
    window.location.href = TARGET_URL;
  } else {
    error.textContent = "비밀번호가 틀렸습니다";
  }
}

  // 엔터키 작동
  document.getElementById("password").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
      go();
    }
  });
</script>

</body>
</html>
