<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACCESS SYSTEM</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #0f172a, #020617);
    color: #00f0ff;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    width: 360px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(0,255,255,0.2);
    text-align: center;
    transition: 0.4s;
  }

  .container.success {
    box-shadow: 0 0 60px rgba(0,255,100,0.7);
    background: rgba(0, 255, 100, 0.08);
  }

  .title {
    font-size: 14px;
    letter-spacing: 2px;
    margin-bottom: 10px;
    opacity: 0.7;
  }

  .status {
    font-size: 18px;
    margin-bottom: 20px;
    height: 24px;
  }

  .display {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 25px;
    width: 100%;
  }

  .word-input {
    width: 100%;
    box-sizing: border-box;
  }

  .buttons {
    display: flex;
    gap: 10px;
  }

  button {
    flex: 1;
    height: 50px;
    border: none;
    border-radius: 12px;
    background: rgba(0, 255, 255, 0.08);
    color: #00f0ff;
    cursor: pointer;
  }

  .clear {
    background: rgba(255, 0, 80, 0.2);
    color: #ff4d6d;
  }
</style>
</head>

<body>

<div class="container" id="container">
  <div class="title">SECURE ACCESS TERMINAL</div>
  <div class="status" id="status"></div>

  <div class="display">
    <input class="word-input" placeholder="WORD 1">
    <input class="word-input" placeholder="WORD 2">
    <input class="word-input" placeholder="WORD 3">
    <input class="word-input" placeholder="WORD 4">
  </div>

  <div class="buttons">
    <button class="clear" onclick="clearAll()">CLR</button>
    <button onclick="check()">ENTER</button>
  </div>
</div>

<script>
const answer = ["헬스케어", "금융", "여가", "주거"]; // 정답 (소문자 기준)
const nextURL = "https://euijin0.github.io/SIU_escape/lastFile.mp4";

const inputs = document.querySelectorAll(".word-input");

// 자동 이동 (엔터 or 스페이스)
inputs.forEach((input, index) => {
  input.addEventListener("keydown", (e) => {
    if ((e.key === "Enter" || e.key === " ") && index < inputs.length - 1) {
      e.preventDefault();
      inputs[index + 1].focus();
    }

    if (e.key === "Backspace" && !input.value && index > 0) {
      inputs[index - 1].focus();
    }
  });
});

function getWords() {
  return Array.from(inputs).map(i => i.value.trim().toLowerCase());
}

function clearAll() {
  inputs.forEach(i => i.value = "");
  inputs[0].focus();
}

function check() {
  const container = document.getElementById("container");
  const status = document.getElementById("status");
  const words = getWords();

  const isCorrect = words.every((word, i) => word === answer[i]);

  if (isCorrect) {
    container.classList.add("success");
    status.textContent = "🟢 ACCESS GRANTED";

    setTimeout(() => {
      window.location.href = nextURL;
    }, 900);

  } else {
    status.textContent = "🔴 ACCESS DENIED";

    container.style.transform = "translateX(-5px)";
    setTimeout(() => container.style.transform = "translateX(5px)", 50);
    setTimeout(() => container.style.transform = "translateX(0)", 100);

    setTimeout(() => {
      status.textContent = "";
    }, 1200);

    clearAll();
  }
}
</script>

</body>
</html>
