<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACCESS SYSTEM</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle at center, #0f172a, #020617);
    color: #00f0ff;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    width: 320px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(0,255,255,0.2);
    text-align: center;
    transition: 0.4s;
  }

  .container.success {
    box-shadow: 0 0 60px rgba(0,255,100,0.7);
    background: rgba(0, 255, 100, 0.08);
  }

  .title {
    font-size: 14px;
    letter-spacing: 2px;
    margin-bottom: 10px;
    opacity: 0.7;
  }

  .status {
    font-size: 18px;
    margin-bottom: 20px;
    height: 24px;
  }

  .display {
    height: 50px;
    margin-bottom: 25px;
    border-radius: 10px;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 15px;
    font-size: 26px;
    letter-spacing: 8px;
    color: #00f0ff;
    box-shadow: inset 0 0 10px rgba(0,255,255,0.3);
  }

  .buttons {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  button {
    height: 65px;
    font-size: 20px;
    border: none;
    border-radius: 12px;
    background: rgba(0, 255, 255, 0.08);
    color: #00f0ff;
    cursor: pointer;
    transition: 0.2s;
  }

  button:hover {
    background: rgba(0, 255, 255, 0.2);
  }

  .clear {
    background: rgba(255, 0, 80, 0.2);
    color: #ff4d6d;
  }
</style>
</head>

<body>

<div class="container" id="container">
  <div class="title">SECURE ACCESS TERMINAL</div>
  <div class="status" id="status"></div>

  <div class="display" id="display"></div>

  <div class="buttons">
    <button onclick="press(1)">1</button>
    <button onclick="press(2)">2</button>
    <button onclick="press(3)">3</button>
    <button onclick="press(4)">4</button>
    <button onclick="press(5)">5</button>
    <button onclick="press(6)">6</button>
    <button onclick="press(7)">7</button>
    <button onclick="press(8)">8</button>
    <button onclick="press(9)">9</button>
    <button class="clear" onclick="clearDisplay()">CLR</button>
    <button onclick="press(0)">0</button>
    <button onclick="check()">ENTER</button>
  </div>
</div>

<script>
let input = "";
const answer = "0612";
const nextURL = "https://euijin0.github.io/SIU_escape/lastFile.mp4";

function press(num) {
  if (input.length < 4) {
    input += num;
    updateDisplay();
  }
}

function updateDisplay() {
  document.getElementById("display").textContent = "●".repeat(input.length);
}

function clearDisplay() {
  input = "";
  updateDisplay();
}

function check() {
  const container = document.getElementById("container");
  const status = document.getElementById("status");

  if (input === answer) {
    container.classList.add("success");
    status.textContent = "🟢 ACCESS GRANTED";

    setTimeout(() => {
      window.location.href = nextURL;
    }, 900);

  } else {
    // 🔴 실패 연출
    status.textContent = "🔴 ACCESS DENIED";

    // 살짝 흔들림 효과
    container.style.transform = "translateX(-5px)";
    setTimeout(() => container.style.transform = "translateX(5px)", 50);
    setTimeout(() => container.style.transform = "translateX(0)", 100);

    setTimeout(() => {
      status.textContent = "";
    }, 1200);

    clearDisplay();
  }
}
</script>

</body>
</html>
