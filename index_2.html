<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>통화중</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont;
  background: #0b1c2c;
  color: white;
  text-align: center;
}

.container {
  padding-top: 100px;
}

.name {
  font-size: 32px;
  margin-top: 20px;
}

.status {
  color: gray;
  margin-top: 10px;
}

.time {
  margin-top: 10px;
  font-size: 18px;
}

.btns {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  margin: 60px 40px;
}

.btn {
  width: 80px;
  height: 80px;
  background: #1e3a52;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  margin: auto;
}

.end {
  margin-top: 50px;
}

.end button {
  width: 80px;
  height: 80px;
  background: red;
  border: none;
  border-radius: 50%;
  font-size: 30px;
  color: white;
}
</style>
</head>

<body>

<div class="container">
  <div class="name" id="name">연결중...</div>
  <div class="status">통화중</div>
  <div class="time" id="time">00:00</div>

  <div class="btns">
    <div class="btn">🔇</div>
    <div class="btn">🔢</div>
    <div class="btn">🔊</div>
    <div class="btn">➕</div>
    <div class="btn">🎥</div>
    <div class="btn">👤</div>
  </div>

  <div class="end">
    <button onclick="endCall()">📞</button>
  </div>
</div>

<script>
// 번호 가져오기
const params = new URLSearchParams(location.search);
const number = params.get("num");

// 📒 동일한 연락처
const contacts = {
  "01099999999": "언니"
};

// 이름 표시
if (contacts[number]) {
  document.getElementById("name").innerText = contacts[number];
} else {
  document.getElementById("name").innerText = number;
}

// ⏱️ 통화 시간 증가
let sec = 0;

setInterval(() => {
  sec++;
  let min = String(Math.floor(sec / 60)).padStart(2, "0");
  let s = String(sec % 60).padStart(2, "0");
  document.getElementById("time").innerText = `${min}:${s}`;
}, 1000);

// 📵 통화 종료 → 돌아가기
function endCall() {
  location.href = "index.html";
}
</script>

</body>
</html>
