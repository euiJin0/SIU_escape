<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SIU 방탈출 실시간 예약</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; background-color: #f4f7f6; }
        .container { max-width: 500px; margin: auto; border: 1px solid #ccc; padding: 25px; border-radius: 12px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 5px; }
        
        .time-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .time-btn { padding: 12px; border: 1px solid #ddd; background: #fff; cursor: pointer; text-align: center; border-radius: 5px; }
        .time-btn.selected { background: #007bff; color: white; }
        .time-btn:disabled { background: #eee; color: #bbb; cursor: not-allowed; text-decoration: line-through; }

        .submit-btn { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; margin-top: 20px; }
        .loading-text { text-align: center; color: #007bff; font-weight: bold; margin: 10px 0; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔒 SIU 방탈출 실시간 예약</h2>
    
    <div class="form-group">
        <label>날짜 선택 (5/6 ~ 5/7)</label>
        <!-- ✅ 여기 수정 -->
        <input type="date" id="res-date" min="2026-05-06" max="2026-05-07">
    </div>

    <div class="form-group">
        <label>시간 선택</label>
        <div id="loading-msg" class="loading-text hidden">예약 현황 확인 중...</div>
        <div id="time-slots" class="time-grid"></div>
    </div>

    <div class="form-group">
        <label>예약자</label>
        <input type="text" id="res-name">
    </div>

    <div class="form-group">
        <label>전화번호</label>
        <input type="tel" id="res-phone">
    </div>

    <button class="submit-btn" id="confirm-btn" onclick="makeReservation()">예약 확정하기</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwHQgJDK5YwiS5S4gFIIBhY2ccTlEyjuVRfbqK-HCrZt4TLDqPqHpT-jYL05INSpR5X/exec";

const timeSlotsContainer = document.getElementById('time-slots');
const loader = document.getElementById('loading-msg');
let selectedTime = null;
let reservations = [];

// 날짜 변경 시
document.getElementById('res-date').addEventListener('change', loadReservations);

// 예약 데이터 불러오기
async function loadReservations() {
    loader.classList.remove('hidden');
    timeSlotsContainer.innerHTML = '';

    try {
        const res = await fetch(API_URL);
        const data = await res.json();

        reservations = data.map(row => ({
            date: String(row[0]).trim(),
            time: String(row[1]).trim(),
            people: Number(row[5])
        }));

        generateTimeSlots();
    } catch (e) {
        console.error(e);
        generateTimeSlots();
    } finally {
        loader.classList.add('hidden');
    }
}

// 시간 슬롯 생성
function generateTimeSlots() {
    const dateValue = document.getElementById('res-date').value;

    const timeSlots = [
        "09:50~10:30", "10:20~11:00", "10:50~11:30",
        "11:20~12:00", "11:50~12:30", "12:20~13:00",
        "12:50~13:30", "13:20~14:00", "13:50~14:30",
        "14:20~15:00", "14:50~15:30", "15:20~16:00",
        "15:50~16:30", "16:20~17:00", "16:50~17:30",
        "17:20~18:00"
    ];

    timeSlots.forEach(timeStr => {
        const btn = document.createElement('button');
        btn.className = 'time-btn';

        let totalPeople = reservations
            .filter(r => r.date === dateValue && r.time === timeStr)
            .reduce((sum, r) => sum + r.people, 0);

        if (totalPeople >= 4) {
            btn.disabled = true;
            btn.innerText = `${timeStr} (마감)`;
        } else {
            btn.innerText = `${timeStr} (${4 - totalPeople}자리 남음)`;
            btn.onclick = () => {
                document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                selectedTime = timeStr;
            };
        }

        timeSlotsContainer.appendChild(btn);
    });
}

// 예약하기
async function makeReservation() {
    const date = document.getElementById('res-date').value;
    const name = document.getElementById('res-name').value;
    const phone = document.getElementById('res-phone').value;

    if (!date || !selectedTime || !name || !phone) {
        alert("모든 정보를 입력하세요.");
        return;
    }

    try {
        await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ date, time: selectedTime, name, phone })
        });

        alert("예약 완료!");
        loadReservations();
    } catch (e) {
        alert("오류 발생");
    }
}

// ✅ 초기 날짜 (중요)
window.onload = () => {
    document.getElementById('res-date').value = "2026-05-06";
    loadReservations();
};
</script>

</body>
</html>
